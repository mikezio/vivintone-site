name: Validate
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: npm ci --ignore-scripts
      - run: python -m pip install -r functions/api/requirements.txt cfn-lint
      - run: npm run test
      - run: npm run check
      - run: cfn-lint infra/template.yaml
      - run: bash -n scripts/deploy.sh
