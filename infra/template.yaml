AWSTemplateFormatVersion: '2010-09-09'
Description: VivintOne public hardware lab, private maintainer workflow, and compatibility catalog

Parameters:
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
  RootDomain:
    Type: String
    Default: mzio.dev
  SiteSubdomain:
    Type: String
    Default: vivintone
  AdminEmail:
    Type: String
    Default: michael@mzio.dev
  AdminUsername:
    Type: String
    Default: admin
  ArtifactBucket:
    Type: String
  ArtifactKey:
    Type: String

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      VersioningConfiguration: { Status: Enabled }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  HardwareTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: pk, AttributeType: S }
        - { AttributeName: sk, AttributeType: S }
        - { AttributeName: gsi1pk, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - { AttributeName: gsi1pk, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      SSESpecification: { SSEEnabled: true }
      TimeToLiveSpecification: { AttributeName: expiresAt, Enabled: true }

  ShippingInstructions:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Approval-only VivintOne Hardware Lab shipping instructions
      SecretString: CONFIGURE_IN_ADMIN

  ReceiptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireReimbursementReceipts
            Status: Enabled
            ExpirationInDays: 180
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [POST]
            AllowedOrigins: [!Sub 'https://${SiteSubdomain}.${RootDomain}']
            MaxAge: 600

  ReceiptsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReceiptsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt ReceiptsBucket.Arn
              - !Sub '${ReceiptsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  EmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Sub '${SiteSubdomain}.${RootDomain}'
      DkimAttributes: { SigningEnabled: true }

  EmailDkim1:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt EmailIdentity.DkimDNSTokenName1
      Type: CNAME
      TTL: '300'
      ResourceRecords: [!GetAtt EmailIdentity.DkimDNSTokenValue1]
  EmailDkim2:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt EmailIdentity.DkimDNSTokenName2
      Type: CNAME
      TTL: '300'
      ResourceRecords: [!GetAtt EmailIdentity.DkimDNSTokenValue2]
  EmailDkim3:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt EmailIdentity.DkimDNSTokenName3
      Type: CNAME
      TTL: '300'
      ResourceRecords: [!GetAtt EmailIdentity.DkimDNSTokenValue3]

  AdminUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: vivintone-hardware-admins
      UserPoolTier: PLUS
      DeletionProtection: ACTIVE
      UsernameConfiguration: { CaseSensitive: false }
      AutoVerifiedAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: 'ON'
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy:
          MinimumLength: 14
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - { Name: verified_email, Priority: 1 }
      UserPoolAddOns: { AdvancedSecurityMode: ENFORCED }

  AdminScope:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: intake
      Name: VivintOne Hardware Intake
      UserPoolId: !Ref AdminUserPool
      Scopes:
        - ScopeName: admin
          ScopeDescription: Manage hardware requests, catalog, and settings

  AdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'vivintone-admin-${AWS::AccountId}'
      UserPoolId: !Ref AdminUserPool

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: AdminScope
    Properties:
      ClientName: vivintone-admin-web
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, intake/admin]
      CallbackURLs: [!Sub 'https://${SiteSubdomain}.${RootDomain}/admin.html']
      LogoutURLs: [!Sub 'https://${SiteSubdomain}.${RootDomain}/']
      SupportedIdentityProviders: [COGNITO]
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 7
      TokenValidityUnits: { AccessToken: hours, IdToken: hours, RefreshToken: days }

  InitialAdmin:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref AdminUserPool
      Username: !Ref AdminUsername
      DesiredDeliveryMediums: [EMAIL]
      UserAttributes:
        - { Name: email, Value: !Ref AdminEmail }
        - { Name: email_verified, Value: 'true' }

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: vivintone-hardware-api
      ProtocolType: HTTP
      DisableExecuteApiEndpoint: false

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RetentionInDays: 30

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref Api
      StageName: $default
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format: '{"requestId":"$context.requestId","route":"$context.routeKey","status":"$context.status","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}'
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: 30
        ThrottlingRateLimit: 15

  AdminAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref Api
      AuthorizerType: JWT
      IdentitySource: ['$request.header.Authorization']
      Name: cognito-admin
      JwtConfiguration:
        Audience: [!Ref AdminUserPoolClient]
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${AdminUserPool}'

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: vivintone-hardware-data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:Query]
                Resource:
                  - !GetAtt HardwareTable.Arn
                  - !Sub '${HardwareTable.Arn}/index/*'
              - Effect: Allow
                Action: ses:SendEmail
                Resource: !Sub 'arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SiteSubdomain}.${RootDomain}'
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue, secretsmanager:PutSecretValue]
                Resource: !Ref ShippingInstructions
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject]
                Resource: !Sub '${ReceiptsBucket.Arn}/receipts/*'

  DirectCarrierPollRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: vivintone-direct-carrier-poll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:Query]
                Resource:
                  - !GetAtt HardwareTable.Arn
                  - !Sub '${HardwareTable.Arn}/index/*'
              - Effect: Allow
                Action: ses:SendEmail
                Resource: !Sub 'arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SiteSubdomain}.${RootDomain}'
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref ShippingInstructions
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DirectCarrierPollDeadLetterQueue.Arn

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: vivintone-hardware-api
      Runtime: python3.13
      Architectures: [arm64]
      Handler: handler.handler
      Role: !GetAtt ApiRole.Arn
      MemorySize: 512
      Timeout: 15
      ReservedConcurrentExecutions: 10
      Code: { S3Bucket: !Ref ArtifactBucket, S3Key: !Ref ArtifactKey }
      Environment:
        Variables:
          TABLE_NAME: !Ref HardwareTable
          SHIPPING_SECRET_ARN: !Ref ShippingInstructions
          RECEIPTS_BUCKET: !Ref ReceiptsBucket
          FROM_EMAIL: !Sub 'hardware@${SiteSubdomain}.${RootDomain}'
          ADMIN_EMAIL: !Ref AdminEmail
          ADMIN_USERNAME: !Ref AdminUsername
          SITE_URL: !Sub 'https://${SiteSubdomain}.${RootDomain}'
          POWERTOOLS_LOG_LEVEL: INFO

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ApiFunction}'
      RetentionInDays: 30

  DirectCarrierPollFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: vivintone-direct-carrier-poll
      Runtime: python3.13
      Architectures: [arm64]
      Handler: handler.handler
      Role: !GetAtt DirectCarrierPollRole.Arn
      MemorySize: 512
      Timeout: 300
      ReservedConcurrentExecutions: 1
      Code: { S3Bucket: !Ref ArtifactBucket, S3Key: !Ref ArtifactKey }
      DeadLetterConfig:
        TargetArn: !GetAtt DirectCarrierPollDeadLetterQueue.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref HardwareTable
          SHIPPING_SECRET_ARN: !Ref ShippingInstructions
          RECEIPTS_BUCKET: !Ref ReceiptsBucket
          FROM_EMAIL: !Sub 'hardware@${SiteSubdomain}.${RootDomain}'
          ADMIN_EMAIL: !Ref AdminEmail
          ADMIN_USERNAME: !Ref AdminUsername
          SITE_URL: !Sub 'https://${SiteSubdomain}.${RootDomain}'
          POWERTOOLS_LOG_LEVEL: INFO

  DirectCarrierPollFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${DirectCarrierPollFunction}'
      RetentionInDays: 30

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 15000

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*'

  CatalogRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/catalog', Target: !Sub 'integrations/${ApiIntegration}' }
  PublicSettingsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/public-settings', Target: !Sub 'integrations/${ApiIntegration}' }
  CreateRequestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/requests', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/reimbursements/{requestId}', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementSubmitRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/reimbursements/{requestId}', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementWaiveRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/reimbursements/{requestId}/waive', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/reimbursements/{requestId}/upload', Target: !Sub 'integrations/${ApiIntegration}' }
  TrackingRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/shipments/{requestId}/tracking', Target: !Sub 'integrations/${ApiIntegration}' }
  PrepaidRatesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/shipments/{requestId}/rates', Target: !Sub 'integrations/${ApiIntegration}' }
  PrepaidLabelUrlRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/shipments/{requestId}/label-url', Target: !Sub 'integrations/${ApiIntegration}' }
  AdminRequestsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/admin/requests', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminRequestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/admin/requests/{requestId}', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminRequestUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'PATCH /api/admin/requests/{requestId}', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminDecisionRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/admin/requests/{requestId}/decision', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminReceiptRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/admin/requests/{requestId}/receipt-url', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminReimbursedRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/admin/requests/{requestId}/reimbursed', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminLabelRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/admin/requests/{requestId}/label', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminLabelRefundRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/admin/requests/{requestId}/label/refund', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminCatalogRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/admin/catalog', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminCatalogCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/admin/catalog', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminCatalogUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'PUT /api/admin/catalog/{modelId}', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminCatalogDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'DELETE /api/admin/catalog/{modelId}', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminSettingsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/admin/settings', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminSettingsUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'PUT /api/admin/settings', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }

  DirectCarrierPollSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Poll official carrier APIs for active VivintOne shipments
      ScheduleExpression: rate(30 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DirectCarrierPollFunction.Arn
          Id: DirectCarrierPoll
          Input: '{"source":"vivintone.tracking","action":"poll_direct_carriers"}'
          DeadLetterConfig:
            Arn: !GetAtt DirectCarrierPollDeadLetterQueue.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600
            MaximumRetryAttempts: 2

  DirectCarrierPollDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  DirectCarrierPollDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref DirectCarrierPollDeadLetterQueue]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EventBridgeDeadLetterDelivery
            Effect: Allow
            Principal: { Service: events.amazonaws.com }
            Action: sqs:SendMessage
            Resource: !GetAtt DirectCarrierPollDeadLetterQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt DirectCarrierPollSchedule.Arn

  DirectCarrierPollPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DirectCarrierPollFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DirectCarrierPollSchedule.Arn

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: vivintone-site-s3
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub '${SiteSubdomain}.${RootDomain}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub '${SiteSubdomain}.${RootDomain}'
          HostedZoneId: !Ref HostedZoneId

  SecurityHeaders:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: vivintone-security-headers
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'self'; connect-src 'self' https://*.amazoncognito.com https://*.amazonaws.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.amazoncognito.com https://*.amazonaws.com"
            Override: true
          ContentTypeOptions: { Override: true }
          FrameOptions: { FrameOption: DENY, Override: true }
          ReferrerPolicy: { ReferrerPolicy: strict-origin-when-cross-origin, Override: true }
          StrictTransportSecurity: { AccessControlMaxAgeSec: 63072000, IncludeSubdomains: true, Preload: true, Override: true }
          XSSProtection: { Protection: true, ModeBlock: true, Override: true }

  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: vivintone-public-edge
      Scope: CLOUDFRONT
      DefaultAction: { Allow: {} }
      VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: vivintone-edge, SampledRequestsEnabled: false }
      Rules:
        - Name: AWSCommon
          Priority: 0
          OverrideAction: { None: {} }
          Statement: { ManagedRuleGroupStatement: { VendorName: AWS, Name: AWSManagedRulesCommonRuleSet } }
          VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: common, SampledRequestsEnabled: false }
        - Name: AWSKnownBadInputs
          Priority: 1
          OverrideAction: { None: {} }
          Statement: { ManagedRuleGroupStatement: { VendorName: AWS, Name: AWSManagedRulesKnownBadInputsRuleSet } }
          VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: bad-inputs, SampledRequestsEnabled: false }
        - Name: SubmissionRateLimit
          Priority: 2
          Action: { Block: {} }
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              EvaluationWindowSec: 300
              Limit: 20
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch: { UriPath: {} }
                  PositionalConstraint: EXACTLY
                  SearchString: /api/requests
                  TextTransformations: [{ Priority: 0, Type: NONE }]
          VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: submission-rate, SampledRequestsEnabled: false }

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: VivintOne project site
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases: [!Sub '${SiteSubdomain}.${RootDomain}']
        DefaultRootObject: index.html
        WebACLId: !GetAtt WebAcl.Arn
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: static
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig: { OriginAccessIdentity: '' }
          - Id: api
            DomainName: !Sub '${Api}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig: { OriginProtocolPolicy: https-only, OriginSSLProtocols: [TLSv1.2] }
        DefaultCacheBehavior:
          TargetOriginId: static
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeaders
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: api
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            ResponseHeadersPolicyId: !Ref SecurityHeaders

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFrontRead
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition: { StringEquals: { 'AWS:SourceArn': !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}' } }
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt SiteBucket.Arn
              - !Sub '${SiteBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  SiteAliasA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${SiteSubdomain}.${RootDomain}'
      Type: A
      AliasTarget: { DNSName: !GetAtt Distribution.DomainName, HostedZoneId: Z2FDTNDATAQYW2 }
  SiteAliasAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${SiteSubdomain}.${RootDomain}'
      Type: AAAA
      AliasTarget: { DNSName: !GetAtt Distribution.DomainName, HostedZoneId: Z2FDTNDATAQYW2 }

Outputs:
  SiteUrl: { Value: !Sub 'https://${SiteSubdomain}.${RootDomain}' }
  SiteBucketName: { Value: !Ref SiteBucket }
  DistributionId: { Value: !Ref Distribution }
  ApiEndpoint: { Value: !GetAtt Api.ApiEndpoint }
  CognitoAuthority: { Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${AdminUserPool}' }
  CognitoClientId: { Value: !Ref AdminUserPoolClient }
  CognitoLoginDomain: { Value: !Sub 'https://${AdminUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com' }
  ShippingSecretArn: { Value: !Ref ShippingInstructions }
  ReceiptsBucketName: { Value: !Ref ReceiptsBucket }
  DirectCarrierPollDeadLetterQueueUrl: { Value: !Ref DirectCarrierPollDeadLetterQueue }
