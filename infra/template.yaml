AWSTemplateFormatVersion: '2010-09-09'
Description: VivintOne public hardware lab, private maintainer workflow, and compatibility catalog

Parameters:
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
  RootDomain:
    Type: String
    Default: mzio.dev
  SiteSubdomain:
    Type: String
    Default: vivintone
  AdminEmail:
    Type: String
    Default: michael@mzio.dev
  AdminUsername:
    Type: String
    Default: admin
  ContributorSmsEnabled:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable contributor SMS OTP only after the AWS account has production SMS access and an approved origination identity
  ArtifactBucket:
    Type: String
  ArtifactKey:
    Type: String

Conditions:
  ContributorSmsEnabledCondition: !Equals [!Ref ContributorSmsEnabled, 'true']

Resources:
  MonthlyGrossCostBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub '${AWS::StackName}-monthly-gross-cost'
        BudgetLimit: { Amount: 25, Unit: USD }
        BudgetType: COST
        CostTypes:
          IncludeCredit: false
          IncludeRefund: false
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification: { ComparisonOperator: GREATER_THAN, NotificationType: ACTUAL, Threshold: 50, ThresholdType: PERCENTAGE }
          Subscribers: [{ Address: !Ref AdminEmail, SubscriptionType: EMAIL }]
        - Notification: { ComparisonOperator: GREATER_THAN, NotificationType: ACTUAL, Threshold: 80, ThresholdType: PERCENTAGE }
          Subscribers: [{ Address: !Ref AdminEmail, SubscriptionType: EMAIL }]
        - Notification: { ComparisonOperator: GREATER_THAN, NotificationType: ACTUAL, Threshold: 100, ThresholdType: PERCENTAGE }
          Subscribers: [{ Address: !Ref AdminEmail, SubscriptionType: EMAIL }]
        - Notification: { ComparisonOperator: GREATER_THAN, NotificationType: FORECASTED, Threshold: 100, ThresholdType: PERCENTAGE }
          Subscribers: [{ Address: !Ref AdminEmail, SubscriptionType: EMAIL }]

  OperationsAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: VivintOne operations alarms
      Subscription:
        - Endpoint: !Ref AdminEmail
          Protocol: email

  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      VersioningConfiguration: { Status: Enabled }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  HardwareTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: pk, AttributeType: S }
        - { AttributeName: sk, AttributeType: S }
        - { AttributeName: gsi1pk, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - { AttributeName: gsi1pk, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      SSESpecification: { SSEEnabled: true }
      TimeToLiveSpecification: { AttributeName: expiresAt, Enabled: true }

  ShippingInstructions:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Approval-only VivintOne Hardware Lab shipping instructions
      SecretString: CONFIGURE_IN_ADMIN

  ReceiptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireReimbursementReceipts
            Status: Enabled
            ExpirationInDays: 180
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [POST]
            AllowedOrigins: [!Sub 'https://${SiteSubdomain}.${RootDomain}']
            MaxAge: 600

  ReceiptsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReceiptsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt ReceiptsBucket.Arn
              - !Sub '${ReceiptsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  EmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Sub '${SiteSubdomain}.${RootDomain}'
      DkimAttributes: { SigningEnabled: true }

  EmailDkim1:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt EmailIdentity.DkimDNSTokenName1
      Type: CNAME
      TTL: '300'
      ResourceRecords: [!GetAtt EmailIdentity.DkimDNSTokenValue1]
  EmailDkim2:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt EmailIdentity.DkimDNSTokenName2
      Type: CNAME
      TTL: '300'
      ResourceRecords: [!GetAtt EmailIdentity.DkimDNSTokenValue2]
  EmailDkim3:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt EmailIdentity.DkimDNSTokenName3
      Type: CNAME
      TTL: '300'
      ResourceRecords: [!GetAtt EmailIdentity.DkimDNSTokenValue3]

  AdminUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: vivintone-hardware-admins
      UserPoolTier: PLUS
      DeletionProtection: ACTIVE
      UsernameConfiguration: { CaseSensitive: false }
      AutoVerifiedAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: 'ON'
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy:
          MinimumLength: 14
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - { Name: verified_email, Priority: 1 }
      UserPoolAddOns: { AdvancedSecurityMode: ENFORCED }

  AdminScope:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: intake
      Name: VivintOne Hardware Intake
      UserPoolId: !Ref AdminUserPool
      Scopes:
        - ScopeName: admin
          ScopeDescription: Manage hardware requests, catalog, and settings

  AdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'vivintone-admin-${AWS::AccountId}'
      UserPoolId: !Ref AdminUserPool

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: AdminScope
    Properties:
      ClientName: vivintone-admin-web
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, intake/admin]
      CallbackURLs: [!Sub 'https://${SiteSubdomain}.${RootDomain}/admin.html']
      LogoutURLs: [!Sub 'https://${SiteSubdomain}.${RootDomain}/']
      SupportedIdentityProviders: [COGNITO]
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 7
      TokenValidityUnits: { AccessToken: hours, IdToken: hours, RefreshToken: days }

  InitialAdmin:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref AdminUserPool
      Username: !Ref AdminUsername
      DesiredDeliveryMediums: [EMAIL]
      UserAttributes:
        - { Name: email, Value: !Ref AdminEmail }
        - { Name: email_verified, Value: 'true' }

  ContributorSmsRole:
    Type: AWS::IAM::Role
    Condition: ContributorSmsEnabledCondition
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: cognito-idp.amazonaws.com }
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                'sts:ExternalId': !Sub 'vivintone-contributors-${AWS::AccountId}-${AWS::Region}'
                'aws:SourceAccount': !Ref AWS::AccountId
              ArnLike:
                'aws:SourceArn': !Sub 'arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'
      Policies:
        - PolicyName: vivintone-contributor-sms
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: '*'

  ContributorPreSignUpRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: vivintone-contributor-presignup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:DeleteItem, dynamodb:Query]
                Resource: !GetAtt HardwareTable.Arn

  ContributorPreSignUpFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: vivintone-contributor-presignup
      Runtime: python3.13
      Architectures: [arm64]
      Handler: handler.presignup_handler
      Role: !GetAtt ContributorPreSignUpRole.Arn
      MemorySize: 128
      Timeout: 5
      ReservedConcurrentExecutions: 5
      Code: { S3Bucket: !Ref ArtifactBucket, S3Key: !Ref ArtifactKey }
      Environment:
        Variables:
          TABLE_NAME: !Ref HardwareTable
          CONTRIBUTOR_SMS_ENABLED: !Ref ContributorSmsEnabled
          POWERTOOLS_LOG_LEVEL: INFO

  ContributorPreSignUpFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ContributorPreSignUpFunction}'
      RetentionInDays: 30

  ContributorUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: EmailIdentity
    Properties:
      UserPoolName: vivintone-hardware-contributors
      UserPoolTier: ESSENTIALS
      DeletionProtection: ACTIVE
      UsernameConfiguration: { CaseSensitive: false }
      UsernameAttributes: [email, phone_number]
      AutoVerifiedAttributes: [email, phone_number]
      MfaConfiguration: 'OFF'
      Policies:
        SignInPolicy:
          AllowedFirstAuthFactors: !If
            - ContributorSmsEnabledCondition
            - [PASSWORD, EMAIL_OTP, SMS_OTP]
            - [PASSWORD, EMAIL_OTP]
      EmailConfiguration:
        EmailSendingAccount: DEVELOPER
        From: !Sub 'VivintOne Contributor Portal <portal@${SiteSubdomain}.${RootDomain}>'
        ReplyToEmailAddress: !Sub 'hardware@${SiteSubdomain}.${RootDomain}'
        SourceArn: !Sub 'arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SiteSubdomain}.${RootDomain}'
      EmailAuthenticationMessage: 'Your VivintOne sign-in code is {####}.'
      EmailAuthenticationSubject: Your VivintOne sign-in code
      SmsAuthenticationMessage: '{####} is your VivintOne sign-in code.'
      SmsConfiguration: !If
        - ContributorSmsEnabledCondition
        - ExternalId: !Sub 'vivintone-contributors-${AWS::AccountId}-${AWS::Region}'
          SnsCallerArn: !GetAtt ContributorSmsRole.Arn
          SnsRegion: !Ref AWS::Region
        - !Ref AWS::NoValue
      LambdaConfig:
        PreSignUp: !GetAtt ContributorPreSignUpFunction.Arn

  ContributorPreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ContributorPreSignUpFunction
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt ContributorUserPool.Arn

  ContributorUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: vivintone-contributor-web
      UserPoolId: !Ref ContributorUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      ExplicitAuthFlows: [ALLOW_USER_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 7
      TokenValidityUnits: { AccessToken: hours, IdToken: hours, RefreshToken: days }

  ContributorAuthWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: vivintone-contributor-auth
      Scope: REGIONAL
      DefaultAction: { Allow: {} }
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: vivintone-contributor-auth
        SampledRequestsEnabled: false
      Rules:
        - Name: ContributorAuthIpRateLimit
          Priority: 0
          Action: { Block: {} }
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              EvaluationWindowSec: 300
              Limit: 30
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: contributor-auth-ip-rate
            SampledRequestsEnabled: false

  ContributorAuthWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !GetAtt ContributorUserPool.Arn
      WebACLArn: !GetAtt ContributorAuthWebAcl.Arn

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: vivintone-hardware-api
      ProtocolType: HTTP
      DisableExecuteApiEndpoint: false

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RetentionInDays: 30

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref Api
      StageName: $default
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format: '{"requestId":"$context.requestId","route":"$context.routeKey","status":"$context.status","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}'
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: 30
        ThrottlingRateLimit: 15

  AdminAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref Api
      AuthorizerType: JWT
      IdentitySource: ['$request.header.Authorization']
      Name: cognito-admin
      JwtConfiguration:
        Audience: [!Ref AdminUserPoolClient]
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${AdminUserPool}'

  ContributorAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref Api
      AuthorizerType: JWT
      IdentitySource: ['$request.header.Authorization']
      Name: cognito-contributor
      JwtConfiguration:
        Audience: [!Ref ContributorUserPoolClient]
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${ContributorUserPool}'

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: vivintone-hardware-data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:Query]
                Resource:
                  - !GetAtt HardwareTable.Arn
                  - !Sub '${HardwareTable.Arn}/index/*'
              - Effect: Allow
                Action: ses:SendEmail
                Resource: !Sub 'arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SiteSubdomain}.${RootDomain}'
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue, secretsmanager:PutSecretValue]
                Resource: !Ref ShippingInstructions
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject]
                Resource: !Sub '${ReceiptsBucket.Arn}/receipts/*'

  DirectCarrierPollRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: vivintone-direct-carrier-poll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:Query]
                Resource:
                  - !GetAtt HardwareTable.Arn
                  - !Sub '${HardwareTable.Arn}/index/*'
              - Effect: Allow
                Action: ses:SendEmail
                Resource: !Sub 'arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SiteSubdomain}.${RootDomain}'
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref ShippingInstructions
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DirectCarrierPollDeadLetterQueue.Arn

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: vivintone-hardware-api
      Runtime: python3.13
      Architectures: [arm64]
      Handler: handler.handler
      Role: !GetAtt ApiRole.Arn
      MemorySize: 512
      Timeout: 15
      ReservedConcurrentExecutions: 10
      Code: { S3Bucket: !Ref ArtifactBucket, S3Key: !Ref ArtifactKey }
      Environment:
        Variables:
          TABLE_NAME: !Ref HardwareTable
          CONTRIBUTOR_SMS_ENABLED: !Ref ContributorSmsEnabled
          SHIPPING_SECRET_ARN: !Ref ShippingInstructions
          RECEIPTS_BUCKET: !Ref ReceiptsBucket
          FROM_EMAIL: !Sub 'hardware@${SiteSubdomain}.${RootDomain}'
          ADMIN_EMAIL: !Ref AdminEmail
          ADMIN_USERNAME: !Ref AdminUsername
          SITE_URL: !Sub 'https://${SiteSubdomain}.${RootDomain}'
          POWERTOOLS_LOG_LEVEL: INFO

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ApiFunction}'
      RetentionInDays: 30

  DirectCarrierPollFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: vivintone-direct-carrier-poll
      Runtime: python3.13
      Architectures: [arm64]
      Handler: handler.handler
      Role: !GetAtt DirectCarrierPollRole.Arn
      MemorySize: 512
      Timeout: 300
      ReservedConcurrentExecutions: 1
      Code: { S3Bucket: !Ref ArtifactBucket, S3Key: !Ref ArtifactKey }
      DeadLetterConfig:
        TargetArn: !GetAtt DirectCarrierPollDeadLetterQueue.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref HardwareTable
          SHIPPING_SECRET_ARN: !Ref ShippingInstructions
          RECEIPTS_BUCKET: !Ref ReceiptsBucket
          FROM_EMAIL: !Sub 'hardware@${SiteSubdomain}.${RootDomain}'
          ADMIN_EMAIL: !Ref AdminEmail
          ADMIN_USERNAME: !Ref AdminUsername
          SITE_URL: !Sub 'https://${SiteSubdomain}.${RootDomain}'
          POWERTOOLS_LOG_LEVEL: INFO

  DirectCarrierPollFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${DirectCarrierPollFunction}'
      RetentionInDays: 30

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 15000

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*'

  CatalogRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/catalog', Target: !Sub 'integrations/${ApiIntegration}' }
  PublicSettingsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/public-settings', Target: !Sub 'integrations/${ApiIntegration}' }
  CreateRequestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/requests', Target: !Sub 'integrations/${ApiIntegration}' }
  VerificationIntentRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/verification-intents', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/reimbursements/{requestId}', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementSubmitRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/reimbursements/{requestId}', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementWaiveRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/reimbursements/{requestId}/waive', Target: !Sub 'integrations/${ApiIntegration}' }
  ReimbursementUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/reimbursements/{requestId}/upload', Target: !Sub 'integrations/${ApiIntegration}' }
  TrackingRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/shipments/{requestId}/tracking', Target: !Sub 'integrations/${ApiIntegration}' }
  PrepaidRatesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/shipments/{requestId}/rates', Target: !Sub 'integrations/${ApiIntegration}' }
  PrepaidLabelUrlRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/shipments/{requestId}/label-url', Target: !Sub 'integrations/${ApiIntegration}' }
  PortalRequestsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/portal/requests', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalCreateRequestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/portal/requests', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalRequestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'GET /api/portal/requests/{requestId}', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalTrackingRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/portal/requests/{requestId}/tracking', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalRatesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/portal/requests/{requestId}/rates', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalLabelUrlRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/portal/requests/{requestId}/label-url', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalReimbursementUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/portal/requests/{requestId}/reimbursement/upload', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalReimbursementRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/portal/requests/{requestId}/reimbursement', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref ContributorAuthorizer }
  PortalReimbursementWaiveRoute:
    Type: AWS::ApiGatewayV2::Route
