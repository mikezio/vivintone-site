  AdminCatalogCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'POST /api/admin/catalog', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminCatalogUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'PUT /api/admin/catalog/{modelId}', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }
  AdminCatalogDeleteRoute:
