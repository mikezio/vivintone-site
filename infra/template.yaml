  AdminSettingsUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref Api, RouteKey: 'PUT /api/admin/settings', Target: !Sub 'integrations/${ApiIntegration}', AuthorizationType: JWT, AuthorizerId: !Ref AdminAuthorizer, AuthorizationScopes: [intake/admin] }

  DirectCarrierPollSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Poll official carrier APIs for active VivintOne shipments
      ScheduleExpression: rate(30 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DirectCarrierPollFunction.Arn
          Id: DirectCarrierPoll
          Input: '{"source":"vivintone.tracking","action":"poll_direct_carriers"}'
          DeadLetterConfig:
            Arn: !GetAtt DirectCarrierPollDeadLetterQueue.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600
            MaximumRetryAttempts: 2

  DirectCarrierPollDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  DirectCarrierPollDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref DirectCarrierPollDeadLetterQueue]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EventBridgeDeadLetterDelivery
            Effect: Allow
            Principal: { Service: events.amazonaws.com }
            Action: sqs:SendMessage
            Resource: !GetAtt DirectCarrierPollDeadLetterQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt DirectCarrierPollSchedule.Arn

  DirectCarrierPollPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DirectCarrierPollFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DirectCarrierPollSchedule.Arn

  ApiFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: VivintOne API Lambda returned one or more errors in five minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{ Name: FunctionName, Value: !Ref ApiFunction }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OperationsAlarmTopic]

  ApiFunctionThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: VivintOne API Lambda was throttled in five minutes
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions: [{ Name: FunctionName, Value: !Ref ApiFunction }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OperationsAlarmTopic]

  ContributorPreSignUpErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Contributor PreSignUp Lambda returned one or more errors in five minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{ Name: FunctionName, Value: !Ref ContributorPreSignUpFunction }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OperationsAlarmTopic]

  ContributorPreSignUpThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Contributor PreSignUp Lambda was throttled in five minutes
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions: [{ Name: FunctionName, Value: !Ref ContributorPreSignUpFunction }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OperationsAlarmTopic]

  DirectCarrierPollErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scheduled direct-carrier polling returned one or more errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{ Name: FunctionName, Value: !Ref DirectCarrierPollFunction }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OperationsAlarmTopic]

  DirectCarrierPollDeadLetterAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scheduled direct-carrier polling has a message waiting in its dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions: [{ Name: QueueName, Value: !GetAtt DirectCarrierPollDeadLetterQueue.QueueName }]
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OperationsAlarmTopic]

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: vivintone-site-s3
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub '${SiteSubdomain}.${RootDomain}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub '${SiteSubdomain}.${RootDomain}'
          HostedZoneId: !Ref HostedZoneId

  SecurityHeaders:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: vivintone-security-headers
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'self'; connect-src 'self' https://*.amazoncognito.com https://*.amazonaws.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.amazoncognito.com https://*.amazonaws.com"
            Override: true
          ContentTypeOptions: { Override: true }
          FrameOptions: { FrameOption: DENY, Override: true }
          ReferrerPolicy: { ReferrerPolicy: strict-origin-when-cross-origin, Override: true }
          StrictTransportSecurity: { AccessControlMaxAgeSec: 63072000, IncludeSubdomains: true, Preload: true, Override: true }
          XSSProtection: { Protection: true, ModeBlock: true, Override: true }

  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: vivintone-public-edge
      Scope: CLOUDFRONT
      DefaultAction: { Allow: {} }
      VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: vivintone-edge, SampledRequestsEnabled: false }
      Rules:
        - Name: AWSCommon
          Priority: 0
          OverrideAction: { None: {} }
          Statement: { ManagedRuleGroupStatement: { VendorName: AWS, Name: AWSManagedRulesCommonRuleSet } }
          VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: common, SampledRequestsEnabled: false }
        - Name: AWSKnownBadInputs
          Priority: 1
          OverrideAction: { None: {} }
          Statement: { ManagedRuleGroupStatement: { VendorName: AWS, Name: AWSManagedRulesKnownBadInputsRuleSet } }
          VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: bad-inputs, SampledRequestsEnabled: false }
        - Name: SubmissionRateLimit
          Priority: 2
          Action: { Block: {} }
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              EvaluationWindowSec: 300
              Limit: 20
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch: { UriPath: {} }
                  PositionalConstraint: EXACTLY
                  SearchString: /api/requests
                  TextTransformations: [{ Priority: 0, Type: NONE }]
          VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: submission-rate, SampledRequestsEnabled: false }
        - Name: VerificationIntentRateLimit
          Priority: 3
          Action: { Block: {} }
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              EvaluationWindowSec: 300
              Limit: 10
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch: { UriPath: {} }
                  PositionalConstraint: EXACTLY
                  SearchString: /api/verification-intents
                  TextTransformations: [{ Priority: 0, Type: NONE }]
          VisibilityConfig: { CloudWatchMetricsEnabled: true, MetricName: verification-intent-rate, SampledRequestsEnabled: false }

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: VivintOne project site
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases: [!Sub '${SiteSubdomain}.${RootDomain}']
        DefaultRootObject: index.html
        WebACLId: !GetAtt WebAcl.Arn
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: static
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig: { OriginAccessIdentity: '' }
          - Id: api
            DomainName: !Sub '${Api}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig: { OriginProtocolPolicy: https-only, OriginSSLProtocols: [TLSv1.2] }
        DefaultCacheBehavior:
          TargetOriginId: static
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeaders
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: api
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            ResponseHeadersPolicyId: !Ref SecurityHeaders

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFrontRead
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition: { StringEquals: { 'AWS:SourceArn': !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}' } }
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt SiteBucket.Arn
              - !Sub '${SiteBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  SiteAliasA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${SiteSubdomain}.${RootDomain}'
      Type: A
      AliasTarget: { DNSName: !GetAtt Distribution.DomainName, HostedZoneId: Z2FDTNDATAQYW2 }
  SiteAliasAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${SiteSubdomain}.${RootDomain}'
      Type: AAAA
      AliasTarget: { DNSName: !GetAtt Distribution.DomainName, HostedZoneId: Z2FDTNDATAQYW2 }

Outputs:
  SiteUrl: { Value: !Sub 'https://${SiteSubdomain}.${RootDomain}' }
  SiteBucketName: { Value: !Ref SiteBucket }
  DistributionId: { Value: !Ref Distribution }
  ApiEndpoint: { Value: !GetAtt Api.ApiEndpoint }
  CognitoAuthority: { Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${AdminUserPool}' }
  CognitoClientId: { Value: !Ref AdminUserPoolClient }
  CognitoLoginDomain: { Value: !Sub 'https://${AdminUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com' }
  ContributorUserPoolId: { Value: !Ref ContributorUserPool }
  ContributorUserPoolClientId: { Value: !Ref ContributorUserPoolClient }
  ContributorCognitoAuthority: { Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${ContributorUserPool}' }
  ContributorSmsEnabled: { Value: !If [ContributorSmsEnabledCondition, 'true', 'false'] }
  ShippingSecretArn: { Value: !Ref ShippingInstructions }
  ReceiptsBucketName: { Value: !Ref ReceiptsBucket }
  DirectCarrierPollDeadLetterQueueUrl: { Value: !Ref DirectCarrierPollDeadLetterQueue }
